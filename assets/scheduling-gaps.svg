<svg width="640" height="212" viewBox="0 0 640 212" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect x="0" y="0" width="640" height="212" rx="12" fill="#ffffff"/>

  <!-- time guides -->
  <g stroke="#e6e8ec" stroke-width="1">
    <line x1="60"  y1="42" x2="60"  y2="150"/>
    <line x1="190" y1="42" x2="190" y2="150"/>
    <line x1="320" y1="42" x2="320" y2="150"/>
    <line x1="450" y1="42" x2="450" y2="150"/>
    <line x1="580" y1="42" x2="580" y2="150"/>
  </g>
  <g fill="#9aa0a6" font-size="11" text-anchor="middle">
    <text x="60"  y="34">0</text>
    <text x="190" y="34">5</text>
    <text x="320" y="34">10</text>
    <text x="450" y="34">15</text>
    <text x="580" y="34">20</text>
  </g>

  <text x="60" y="20" fill="#202124" font-size="13" font-weight="700">end + 1 margin — a gap is reserved after every interval</text>

  <!-- col labels -->
  <g fill="#9aa0a6" font-size="11" text-anchor="end">
    <text x="50" y="75">col 1</text>
    <text x="50" y="107">col 2</text>
    <text x="50" y="139">col 3</text>
  </g>

  <!-- col 1: a, d -->
  <g><rect x="86"  y="60" width="234" height="22" rx="4" fill="#4C8BF5"/><text x="203" y="75" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">a</text></g>
  <rect x="320" y="60" width="26" height="22" rx="4" fill="#4C8BF5" opacity="0.3"/>
  <g><rect x="372" y="60" width="208" height="22" rx="4" fill="#EA4335"/><text x="476" y="75" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">d</text></g>
  <rect x="580" y="60" width="26" height="22" rx="4" fill="#EA4335" opacity="0.3"/>

  <!-- col 2: b, e -->
  <g><rect x="190" y="92" width="260" height="22" rx="4" fill="#34A853"/><text x="320" y="107" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">b</text></g>
  <rect x="450" y="92" width="26" height="22" rx="4" fill="#34A853" opacity="0.3"/>
  <g><rect x="476" y="92" width="26"  height="22" rx="4" fill="#A142F4"/><text x="489" y="107" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">e</text></g>
  <rect x="502" y="92" width="26" height="22" rx="4" fill="#A142F4" opacity="0.3"/>

  <!-- col 3: c -->
  <g><rect x="320" y="124" width="260" height="22" rx="4" fill="#FBBC05"/><text x="450" y="139" fill="#5f4b00" font-size="12" font-weight="600" text-anchor="middle">c</text></g>
  <rect x="580" y="124" width="26" height="22" rx="4" fill="#FBBC05" opacity="0.3"/>

  <!-- legend -->
  <rect x="60"  y="172" width="14" height="14" rx="3" fill="#5f6368"/>
  <text x="80"  y="183" fill="#5f6368" font-size="12">interval</text>
  <rect x="156" y="172" width="14" height="14" rx="3" fill="#5f6368" opacity="0.3"/>
  <text x="176" y="183" fill="#5f6368" font-size="12">margin (reserved gap)</text>
</svg>
