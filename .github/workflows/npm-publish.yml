name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Remove placeholder token for OIDC
        run: sed -i '/:_authToken=/d; /always-auth/d' "$NPM_CONFIG_USERCONFIG"
      - name: Install dependencies
        run: npm ci
      - name: Publish package
        run: npm publish
